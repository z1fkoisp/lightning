name: Test PyTorch
'on':
  push:
    branches:
    - master
    - release/*
  pull_request:
    branches:
    - master
    - release/*
    types:
    - opened
    - reopened
    - ready_for_review
    - synchronize
    paths:
    - .actions/**
    - requirements/pytorch/**
    - src/lightning/pytorch/**
    - src/pytorch_lightning/*
    - tests/tests_pytorch/**
    - tests/legacy/**
    - pyproject.toml
    - .github/workflows/ci-tests-pytorch.yml
    - requirements/fabric/**
    - src/lightning/fabric/**
    - src/lightning_fabric/*
    - '!requirements/pytorch/docs.txt'
    - '!*.md'
    - '!**/*.md'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ ! (github.ref == 'refs/heads/master' || startsWith(github.ref,
    'refs/heads/release/')) }}
env:
  PACKAGE_NAME: pytorch
  FREEZE_REQUIREMENTS: 1
defaults:
  run:
    shell: bash
jobs:
  pl-cpu:
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-latest
          pkg-name: lightning
          python-version: '3.8'
          pytorch-version: '1.11'
        - os: macos-latest
          pkg-name: lightning
          python-version: '3.9'
          pytorch-version: '1.12'
        - os: ubuntu-latest
          pkg-name: lightning
          python-version: '3.9'
          pytorch-version: '1.11'
        - os: ubuntu-latest
          pkg-name: lightning
          python-version: '3.10'
          pytorch-version: '1.12'
        - os: windows-2022
          pkg-name: lightning
          python-version: '3.9'
          pytorch-version: '1.11'
        - os: windows-2022
          pkg-name: lightning
          python-version: '3.10'
          pytorch-version: '1.12'
        - os: macos-latest
          pkg-name: lightning
          python-version: '3.10'
          pytorch-version: '1.13'
        - os: ubuntu-latest
          pkg-name: lightning
          python-version: '3.10'
          pytorch-version: '1.13'
        - os: windows-2022
          pkg-name: lightning
          python-version: '3.10'
          pytorch-version: '1.13'
        - os: macos-latest
          pkg-name: lightning
          python-version: '3.8'
          pytorch-version: '1.11'
          requires: oldest
        - os: ubuntu-latest
          pkg-name: lightning
          python-version: '3.8'
          pytorch-version: '1.11'
          requires: oldest
        - os: windows-2022
          pkg-name: lightning
          python-version: '3.8'
          pytorch-version: '1.11'
          requires: oldest
        - os: macos-latest
          pkg-name: pytorch
          python-version: '3.8'
          pytorch-version: '1.13'
        - os: ubuntu-latest
          pkg-name: pytorch
          python-version: '3.8'
          pytorch-version: '1.13'
        - os: windows-2022
          pkg-name: pytorch
          python-version: '3.8'
          pytorch-version: '1.13'
    timeout-minutes: 70
    env:
      PACKAGE_NAME: ${{ matrix.pkg-name }}
      FREEZE_REQUIREMENTS: 1
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: basic setup
      run: 'pip --version

        pip install -q -r .actions/requirements.txt

        '
    - name: Set min. dependencies
      if: ${{ matrix.requires == 'oldest' }}
      run: 'python .actions/assistant.py replace_oldest_ver

        '
    - name: Pull legacy checkpoints
      run: bash .actions/pull_legacy_checkpoints.sh
    - name: Adjust PyTorch versions in requirements files
      if: ${{ matrix.requires != 'oldest' }}
      run: "for fpath in `ls requirements/**/*.txt`; do \\\n  python ./requirements/pytorch/adjust-versions.py\
        \ $fpath ${{ matrix.pytorch-version }}; \\\ndone\ncat requirements/pytorch/base.txt\n"
    - name: pip wheels cache
      uses: actions/cache@v3
      with:
        path: .wheels
        key: pip_wheels
        enableCrossOsArchive: true
    - name: Env. variables
      run: '# Switch PyTorch URL

        python -c "print(''TORCH_URL=https://download.pytorch.org/whl/'' + str(''test/cpu/torch_test.html''
        if ''${{matrix.release}}'' == ''pre'' else ''cpu/torch_stable.html''))" >>
        $GITHUB_ENV

        # Switch coverage scope

        python -c "print(''COVERAGE_SCOPE='' + str(''lightning'' if ''${{matrix.pkg-name}}''
        == ''lightning'' else ''pytorch_lightning''))" >> $GITHUB_ENV

        '
    - name: Install package & dependencies
      run: 'pip install -e .[extra,test] "pytest-timeout" --upgrade -f ${TORCH_URL}
        -f ".wheels/"

        pip list

        '
    - name: Dump handy wheels
      if: github.event_name == 'push'
      uses: ./.github/actions/pip-wheels
      with:
        torch-url: ${{ env.TORCH_URL }}
    - name: Cache datasets
      uses: actions/cache@v3
      with:
        path: Datasets
        key: pl-dataset
    - name: Sanity check
      run: 'python -c "from torch import __version__ as ver; assert ver.startswith(''${{
        matrix.pytorch-version }}''), ver"

        python requirements/pytorch/check-avail-extras.py

        '
    - name: Adjust tests -> PL
      if: ${{ matrix.pkg-name != 'lightning' }}
      run: "python .actions/assistant.py copy_replace_imports --source_dir=\"./tests\"\
        \ \\\n  --source_import=\"lightning.fabric,lightning.pytorch\" \\\n  --target_import=\"\
        lightning_fabric,pytorch_lightning\"\n"
    - name: Testing Warnings
      working-directory: tests/tests_pytorch
      run: python utilities/test_warnings.py
    - name: Testing PyTorch
      working-directory: tests/tests_pytorch
      run: "python -m coverage run --source ${{ env.COVERAGE_SCOPE }} \\\n  -m pytest\
        \ . -v --timeout=60 --durations=50 --reruns 3 --reruns-delay 1\n"
    - name: Statistics
      if: success()
      working-directory: tests/tests_pytorch
      run: 'coverage report

        coverage xml

        '
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      continue-on-error: true
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: tests/tests_pytorch/coverage.xml
        flags: ${{ env.COVERAGE_SCOPE }},cpu,pytest-full,python${{ matrix.python-version
          }},pytorch${{ matrix.pytorch-version }}
        name: CPU-coverage
        fail_ci_if_error: false
