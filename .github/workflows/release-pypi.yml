name: PyPI
'on':
  push:
    branches:
    - master
    - release/*
  release:
    types:
    - published
defaults:
  run:
    shell: bash
jobs:
  build-packages:
    uses: ./.github/workflows/_build-packages.yml
    with:
      artifact-name: dist-packages-${{ github.sha }}
  upload-packages:
    runs-on: ubuntu-latest
    needs: build-packages
    if: github.event_name == 'release'
    steps:
    - uses: actions/checkout@v3
    - uses: actions/download-artifact@v3
      with:
        name: dist-packages-${{ github.sha }}
        path: dist
    - run: ls -lh dist/
    - name: Upload to release
      uses: AButler/upload-release-assets@v2.0
      with:
        files: dist/*/*
        repo-token: ${{ secrets.GITHUB_TOKEN }}
  release-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.lai-package.outputs.version }}
    steps:
    - uses: actions/checkout@v3
    - name: install Package
      env:
        PACKAGE_NAME: lightning
      run: pip install . -f https://download.pytorch.org/whl/cpu/torch_stable.html
    - name: package Version
      id: lai-package
      run: python -c "import lightning as L; print(f'version={L.__version__}')" >>
        $GITHUB_OUTPUT
  signaling:
    runs-on: ubuntu-latest
    needs:
    - release-version
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    env:
      TAG: ${{ needs.release-version.outputs.tag }}
    steps:
    - uses: actions/setup-python@v4
      with:
        python-version: 3.8
    - uses: actions/checkout@v3
      with:
        repository: gridai/base-images
        token: ${{ secrets.PAT_GHOST }}
    - name: Update lightning version
      run: "import json, os\nwith open(\"versions.json\") as fo:\n    vers = json.load(fo)\n\
        vers[\"lightning_version\"] = os.getenv('TAG')\nwith open(\"versions.json\"\
        , \"w\") as fw:\n    json.dump(vers, fw)\n"
      shell: python
    - run: cat versions.json
    - name: GIT commit & push
      env:
        BRANCH_NAME: trigger/lightning-${{ env.TAG }}
      run: 'git config --global user.name "PL Ghost"

        git config --global user.email pl-github@grid.ai

        git checkout -b ${BRANCH_NAME}

        git add versions.json

        git status

        git commit -m "bumping lightning version -> ${TAG}"

        git push -u origin ${BRANCH_NAME} -f

        '
  waiting:
    runs-on: ubuntu-latest
    needs:
    - release-version
    - signaling
    env:
      TAG: ${{ needs.release-version.outputs.tag }}
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: 3.8
    - run: pip install gitpython
    - name: Delay releasing
      run: "import git, os, time\nrepo = git.Repo('.')\nbranch = f\"origin/builds/{os.getenv('TAG')}\"\
        \nwhile True:\n  remote_refs = [b.name for b in repo.remote().refs]\n  print([n\
        \ for n in remote_refs if \"builds\" in n])\n  if branch in remote_refs:\n\
        \    break\n  time.sleep(60)\n  for remote in repo.remotes:\n    remote.fetch()\n"
      shell: python
  pre-publish-packages:
    runs-on: ubuntu-latest
    needs: build-packages
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    strategy:
      matrix:
        name:
        - APP
        - FABRIC
        - PYTORCH
        - LIGHTNING
    steps:
    - uses: actions/checkout@v3
    - uses: actions/download-artifact@v3
      with:
        name: dist-packages-${{ github.sha }}
        path: dist
    - name: Browse folder
      id: folder
      run: 'sudo apt install -q -y tree

        tree -L 2 -h dist/

        python -c "print(''pkg='' + ''${{ matrix.name }}''.lower())" >> $GITHUB_OUTPUT

        '
    - uses: ./.github/actions/pkg-publish
      with:
        pkg-folder: dist/${{ steps.folder.outputs.pkg }}
        pypi-test-token: ${{ secrets[format('PYPI_TEST_TOKEN_{0}', matrix.name)] }}
  publish-packages:
    runs-on: ubuntu-latest
    needs:
    - build-packages
    - waiting
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    strategy:
      matrix:
        name:
        - APP
        - FABRIC
        - PYTORCH
        - LIGHTNING
    steps:
    - uses: actions/checkout@v3
    - uses: actions/download-artifact@v3
      with:
        name: dist-packages-${{ github.sha }}
        path: dist
    - name: Browse folder
      id: folder
      run: 'sudo apt install -q -y tree

        tree -L 2 -h dist/

        python -c "print(''pkg='' + ''${{ matrix.name }}''.lower())" >> $GITHUB_OUTPUT

        '
    - uses: ./.github/actions/pkg-publish
      with:
        pkg-folder: dist/${{ steps.folder.outputs.pkg }}
        pypi-token: ${{ secrets[format('PYPI_TOKEN_{0}', matrix.name)] }}
  legacy-checkpoints:
    needs:
    - build-packages
    uses: ./.github/workflows/legacy-checkpoints.yml
    with:
      push_to_s3: ${{ startsWith(github.event.ref, 'refs/tags') || github.event_name
        == 'release' }}
      create_pr: ${{ startsWith(github.event.ref, 'refs/tags') || github.event_name
        == 'release' }}
    secrets: inherit
